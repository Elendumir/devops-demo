name: Devops Demo CI

on:
  push:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name:   Build Docker image
        run: docker build -t devops-demo ./app

      - name: Run container
        run: docker run -d -p 5000:5000 devops-demo
  
      - name: Test application 
        run: |
          sleep 5
          curl http://localhost:5000
