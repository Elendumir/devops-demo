name: CI/CD to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest ./app

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-demo:latest

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Deploy to VPS via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                host: ${{ secrets.SSH_HOST_VPS }}
                username: ${{ secrets.SSH_USER_VPS }}
                key: ${{ secrets.SSH_KEY_VPS }}
                script: |
                  kubectl set image deployment/devops-demo devops-demo=${{ secrets.DOCKER_USERNAME }}/devops-demo:latest
                  kubectl rollout restart deployment/devops-demo
                  kubectl rollout status deployment/devops-demo
