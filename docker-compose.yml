version: "3"

services:

    app:
      build: ./app
      container_name: flask-app
      expose:
        - "8000"

    nginx:
      image: nginx:latest
      container_name: nginx-proxy
      ports:
        - "8080:80"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      depends_on:
        - app
