apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: 
  name: devops-demo-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - www.430sgg.realhost-free.net
      secretName: devops-demo-tls
        
  rules:
    - host: www.430sgg.realhost-free.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-demo
                port:
                  number: 8000
