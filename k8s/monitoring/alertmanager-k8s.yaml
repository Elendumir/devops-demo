apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          imagePullPolicy: Always
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
          env:
            - name: TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-secret
                  key: telegram_token

            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                    name: alertmanager-secret
                    key: telegram_chat_id
      volumes:
        - name: config
          configMap:
            name: monitoring-config
